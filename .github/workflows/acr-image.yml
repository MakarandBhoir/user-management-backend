name: Build and push Docker image to ACR

on:
    push:
        branches: [ "main" ]
    workflow_dispatch:

env:
    REGISTRY_NAME: tcsregistry
    REGISTRY_LOGIN_SERVER: tcsregistry.azurecr.io
    IMAGE_NAME: user-management-backend

permissions:
    contents: read
    id-token: write

jobs:
    docker:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to Azure with OIDC
              uses: azure/login@v2
              with:
                  client-id: ${{ secrets.AZURE_CLIENT_ID }}
                  tenant-id: ${{ secrets.AZURE_TENANT_ID }}
                  subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

            - name: Log in to Azure Container Registry
              run: az acr login --name ${{ env.REGISTRY_NAME }}

            - name: Build and push image
              run: |
                  docker buildx build \
                    --platform linux/amd64 \
                    --tag ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest \
                    --tag ${{ env.REGISTRY_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
                    --push \
                    .
