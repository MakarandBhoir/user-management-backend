spring.application.name=user-management-backend
server.port=${PORT:8080}

spring.datasource.url=jdbc:h2:mem:userdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

management.endpoints.web.exposure.include=health,info,env,metrics,beans,configprops
management.endpoint.health.show-details=always

springdoc.swagger-ui.path=/swagger-ui.html

logging.level.com.tcs.usermanagement=INFO